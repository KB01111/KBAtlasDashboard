# .github/workflows/lint.yml

name: Lint and Format Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9 # Use the same version as in package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use the same version as specified in engines
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run ESLint check
        run: pnpm lint

      - name: Run Prettier check
        run: pnpm prettier

      # Optional: Add build check
      # - name: Run build
      #   run: pnpm build

      # Optional: Add test run
      # - name: Run tests
      #   run: pnpm test

